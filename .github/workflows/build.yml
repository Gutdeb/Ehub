name: Build APK

on:
  push:
    branches: [main, master]
    paths:
      - 'emailhub-android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'emailhub-android/**'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emailhub-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Create local.properties with SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew (if present)
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emailhub-debug-apk
          path: emailhub-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: emailhub-release-apk-unsigned
          path: emailhub-android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            emailhub-android/app/build/outputs/apk/debug/*.apk
            emailhub-android/app/build/outputs/apk/release/*.apk
            
